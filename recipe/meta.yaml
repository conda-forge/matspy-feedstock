{% set name = "matspy" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/matspy-{{ version }}.tar.gz
  sha256: 4c9abda5c57c4e35fca9aa6d436995c0ecfdc001b28a45f746f408e9acf6b9e8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - matplotlib-base

test:
  imports:
    - matspy
  commands:
    - pip check
    - pytest tests
  requires:
    - pip
    - pytest
    - scipy
    - python-graphblas
    - sparse
    - python {{ python_min }}
  source_files:
    - tests/

about:
  home: https://github.com/alugowski/matspy
  summary: Sparse matrix spy plot and sparkline renderer that works with Jupyter.
  license: BSD-2-Clause
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - alugowski
